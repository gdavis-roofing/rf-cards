<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RF Cards — Roofing Force</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#D1271E;--red-dark:#a01e17;--bg:#0a0a0a;--surface:#111;--surface2:#181818;--border:#242424;--text:#f0ede8;--muted:#666;--green:#27ae60;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .header-left .title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--red);letter-spacing:1px;}
  .header-left .sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .btn-add{background:var(--red);border:none;border-radius:3px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:9px 20px;cursor:pointer;}
  .btn-add:hover{background:var(--red-dark);}
  .body{padding:24px;}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .card-item{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px;position:relative;overflow:hidden;transition:border-color 0.15s;}
  .card-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);}
  .card-item:hover{border-color:rgba(209,39,30,0.4);}
  .card-avatar{width:48px;height:48px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;margin-bottom:12px;}
  .card-name{font-size:15px;font-weight:600;margin-bottom:2px;}
  .card-title-text{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .card-phone{font-size:12px;color:#aaa;margin-bottom:8px;}
  .card-url{font-size:11px;color:var(--red);margin-bottom:14px;}
  .card-actions{display:flex;gap:6px;flex-wrap:wrap;}
  .btn-sm{background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 10px;cursor:pointer;transition:all 0.15s;text-decoration:none;}
  .btn-sm:hover{color:var(--text);border-color:var(--muted);}
  .btn-sm.danger:hover{color:#ff6b6b;border-color:#ff6b6b;}
  .btn-sm.primary{background:var(--red);border-color:var(--red);color:#fff;}
  .status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(39,174,96,0.5);margin-right:5px;}
  .status-inactive{background:var(--muted);box-shadow:none;}
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:32px;width:100%;max-width:460px;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.8);max-height:90vh;overflow-y:auto;}
  .modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;margin-bottom:24px;letter-spacing:1px;}
  .form-group{margin-bottom:14px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 11px;outline:none;transition:border-color 0.15s;}
  .form-input:focus{border-color:var(--red);}
  .form-hint{font-size:10px;color:var(--muted);margin-top:4px;}
  .modal-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end;}
  .btn-cancel{background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 18px;cursor:pointer;}
  .btn-save{background:var(--red);border:none;border-radius:3px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:8px 20px;cursor:pointer;}
  .btn-save:disabled{opacity:0.5;cursor:not-allowed;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:10px 20px;font-size:13px;color:var(--text);z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .toast.success{border-color:var(--green);color:var(--green);}
  .toast.error{border-color:#ff6b6b;color:#ff6b6b;}
  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:16px;}
  @media(max-width:600px){.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="title">RF CARDS</div>
    <div class="sub">Digital Business Cards</div>
  </div>
  <button class="btn-add" onclick="openAdd()">+ New Card</button>
</div>

<div class="body">
  <div class="cards-grid" id="cards-grid">
    <div class="empty"><div class="empty-icon">📇</div><div>Loading...</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Card</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input class="form-input" id="inp-first" type="text" placeholder="Preston" oninput="autoSlug()">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input class="form-input" id="inp-last" type="text" placeholder="Golden">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="inp-title" type="text" placeholder="Sales Rep">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="inp-phone" type="tel" placeholder="(479) 555-0100">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="inp-email" type="email" placeholder="preston@roofingforce.com">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Market</label>
      <input class="form-input" id="inp-market" type="text" placeholder="Joplin, MO">
    </div>
    <div class="form-group">
      <label class="form-label">Card URL Slug</label>
      <input class="form-input" id="inp-slug" type="text" placeholder="preston">
      <div class="form-hint">Card will be live at rf-cards.vercel.app/<span id="slug-preview">slug</span></div>
    </div>
    <div class="form-group">
      <label class="form-label">Photo URL <span style="color:#444;font-size:9px;text-transform:none;letter-spacing:0">(optional — paste image link)</span></label>
      <input class="form-input" id="inp-photo" type="url" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveCard()">Save Card</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://bbkyykcoheqbivycztva.supabase.co';
const SB_KEY = 'sb_publishable_8m3cMwg_zFD--_uZE9gSfw_9Htd1It4';

async function sb(path, opts={}) {
  const headers = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(opts.prefer) headers['Prefer'] = opts.prefer;
  const res = await fetch(SB_URL+'/rest/v1/'+path, {headers, method:opts.method||'GET', body:opts.body||undefined});
  if(res.status===204) return null;
  if(!res.ok){ const t=await res.text(); console.error('SB error:',res.status,t); throw new Error(t); }
  return res.json();
}

let cards=[], editId=null;

async function load() {
  try {
    const data = await sb('rf_cards?order=last,first');
    cards = data||[];
    render();
  } catch(e) {
    document.getElementById('cards-grid').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>Could not load cards: ${e.message}</div></div>`;
  }
}

function render() {
  const grid = document.getElementById('cards-grid');
  if(!cards.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📇</div><div>No cards yet — add your first rep</div></div>`;
    return;
  }
  grid.innerHTML = cards.map(c => {
    const init = ((c.first||'')[0]+(c.last||'')[0]).toUpperCase();
    const active = c.active !== false;
    return `<div class="card-item" style="${active?'':'opacity:0.5'}">
      <div class="card-avatar">${init||'RF'}</div>
      <div style="font-size:10px;color:${active?'var(--green)':'var(--muted)'};margin-bottom:8px;">
        <span class="status-dot ${active?'':'status-inactive'}"></span>${active?'Active':'Inactive'}
      </div>
      <div class="card-name">${c.first||''} ${c.last||''}</div>
      <div class="card-title-text">${c.title||'Sales Rep'}${c.market?' · '+c.market:''}</div>
      <div class="card-phone">${c.phone||'No phone set'}</div>
      <div class="card-url">rf-cards.vercel.app/${c.slug}</div>
      <div class="card-actions">
        <a class="btn-sm primary" href="https://rf-cards.vercel.app/${c.slug}" target="_blank">View</a>
        <button class="btn-sm" onclick="openEdit(${c.id})">Edit</button>
        <button class="btn-sm ${active?'danger':''}" onclick="toggleActive(${c.id})">${active?'Deactivate':'Activate'}</button>
        <button class="btn-sm danger" onclick="deleteCard(${c.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function autoSlug() {
  const first = document.getElementById('inp-first').value.trim().toLowerCase();
  if(!editId) document.getElementById('inp-slug').value = first.replace(/\s+/g,'');
  document.getElementById('slug-preview').textContent = document.getElementById('inp-slug').value||'slug';
}

document.getElementById('inp-slug').addEventListener('input', ()=>{
  document.getElementById('slug-preview').textContent = document.getElementById('inp-slug').value||'slug';
});

function openAdd() {
  editId = null;
  document.getElementById('modal-title').textContent = 'New Card';
  document.getElementById('btn-save').textContent = 'Save Card';
  ['first','last','title','phone','email','market','slug','photo'].forEach(f=>document.getElementById('inp-'+f).value='');
  document.getElementById('slug-preview').textContent = 'slug';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('inp-first').focus(),100);
}

function openEdit(id) {
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit Card';
  document.getElementById('btn-save').textContent = 'Update Card';
  document.getElementById('inp-first').value = c.first||'';
  document.getElementById('inp-last').value = c.last||'';
  document.getElementById('inp-title').value = c.title||'';
  document.getElementById('inp-phone').value = c.phone||'';
  document.getElementById('inp-email').value = c.email||'';
  document.getElementById('inp-market').value = c.market||'';
  document.getElementById('inp-slug').value = c.slug||'';
  document.getElementById('inp-photo').value = c.photo_url||'';
  document.getElementById('slug-preview').textContent = c.slug||'slug';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); editId=null; }

async function saveCard() {
  const data = {
    first: document.getElementById('inp-first').value.trim(),
    last: document.getElementById('inp-last').value.trim(),
    title: document.getElementById('inp-title').value.trim()||'Sales Rep',
    phone: document.getElementById('inp-phone').value.trim(),
    email: document.getElementById('inp-email').value.trim(),
    market: document.getElementById('inp-market').value.trim(),
    slug: document.getElementById('inp-slug').value.trim().toLowerCase().replace(/\s+/g,''),
    photo_url: document.getElementById('inp-photo').value.trim()||null,
  };
  if(!data.first){ showToast('Enter a first name','error'); return; }
  if(!data.slug){ showToast('Enter a URL slug','error'); return; }
  if(cards.find(c=>c.slug===data.slug&&c.id!==editId)){ showToast('Slug already in use','error'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='Saving...';
  try {
    if(editId) {
      await sb(`rf_cards?id=eq.${editId}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify(data)});
      const idx=cards.findIndex(c=>c.id===editId);
      if(idx>-1) cards[idx]={...cards[idx],...data};
      showToast('Card updated ✓','success');
    } else {
      const res = await sb('rf_cards?select=*',{method:'POST',prefer:'return=representation',body:JSON.stringify({...data,active:true})});
      cards.push(res[0]);
      showToast('Card saved — live at rf-cards.vercel.app/'+data.slug,'success');
    }
    render(); closeModal();
  } catch(e){ showToast('Error: '+e.message,'error'); }
  finally{ btn.disabled=false; btn.textContent=editId?'Update Card':'Save Card'; }
}

async function toggleActive(id) {
  const c=cards.find(x=>x.id===id); if(!c) return;
  const newVal=!(c.active!==false);
  try {
    await sb(`rf_cards?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({active:newVal})});
    c.active=newVal; render();
    showToast(c.first+(newVal?' activated':' deactivated'));
  } catch(e){ showToast('Error: '+e.message,'error'); }
}

async function deleteCard(id) {
  const c=cards.find(x=>x.id===id); if(!c) return;
  if(!confirm(`Delete card for ${c.first}? This cannot be undone.`)) return;
  try {
    await sb(`rf_cards?id=eq.${id}`,{method:'DELETE'});
    cards=cards.filter(x=>x.id!==id); render();
    showToast(c.first+' deleted');
  } catch(e){ showToast('Error: '+e.message,'error'); }
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.className='toast',3000);
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
load();
</script>
</body>
</html>
