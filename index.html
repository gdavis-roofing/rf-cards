<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF Cards — Roofing Force</title>
<style>
  body { background: #0a0a0a; color: #f0ede8; font-family: 'DM Sans', sans-serif; margin: 0; padding: 40px 20px; }
  h1 { font-family: Georgia, serif; color: #D1271E; font-size: 36px; margin-bottom: 4px; }
  p { color: #666; font-size: 13px; margin-bottom: 40px; }
  .card { background: #111; border: 1px solid #242424; border-radius: 6px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .card-name { font-size: 16px; font-weight: 600; }
  .card-url { font-size: 12px; color: #666; }
  .btn { background: #D1271E; color: white; border: none; border-radius: 4px; padding: 8px 16px; font-size: 12px; cursor: pointer; text-decoration: none; }
</style>
</head>
<body>
  <h1>RF CARDS</h1>
  <p>Digital business cards for Roofing Force reps</p>
  <div class="card">
    <div>
      <div class="card-name">Preston Golden</div>
      <div class="card-url">rf-cards.vercel.app/preston</div>
    </div>
    <a class="btn" href="/preston">View Card</a>
  </div>

</html>
